name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - run: cargo test --workspace --all-features
      - run: cargo clippy --workspace --all-features -- -D warnings
      - run: cargo fmt --all -- --check

  release:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install semantic-release
        run: |
          npm install -g semantic-release \
            @semantic-release/github \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release

  build-ubuntu:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - run: cargo install cargo-deb --locked
      - run: cargo build --workspace --release
      - run: cd crates/trueid-daemon && cargo deb

      - uses: actions/upload-artifact@v4
        with:
          name: trueid-ubuntu-deb
          path: target/debian/*.deb

  build-fedora:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - run: dnf install -y rust cargo gcc make openssl-devel
      - run: cargo install cargo-rpm --locked
      - run: cargo build --workspace --release
      - run: cd crates/trueid-daemon && cargo rpm build

      - uses: actions/upload-artifact@v4
        with:
          name: trueid-fedora-rpm
          path: target/release/rpmbuild/RPMS/**/*.rpm

  deploy:
    needs: [build-ubuntu, build-fedora]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: 'trueid-*'
          merge-multiple: true
          path: dist

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF#refs/tags/}" dist/* --clobber