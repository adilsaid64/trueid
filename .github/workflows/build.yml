name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt
    - name: Run Tests
      run: cargo test --all
    - name: Run Clippy
      run: cargo clippy --all -- -D warnings

  release:
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: MarcoIeni/release-plz-action@v0.5
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ubuntu:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: dtolnay/rust-toolchain@stable
    - name: Install cargo-deb
      run: cargo install cargo-deb
    - name: Build Release
      run: cargo build --release
    - name: Create .deb Package
      run: cd crates/trueid-daemon && cargo deb
    - name: Upload .deb Artifact
      uses: actions/upload-artifact@v3
      with:
        name: trueid-ubuntu-deb
        path: crates/trueid-daemon/target/debian/*.deb

  build-fedora:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest 
    container: fedora:latest
    steps:
    - uses: actions/checkout@v3
    - name: Install dependencies
      run: dnf install -y rust cargo gcc make openssl-devel
    - name: Install cargo-rpm
      run: cargo install cargo-rpm
    - name: Build Release
      run: cargo build --release
    - name: Create .rpm Package
      run: cd crates/trueid-daemon && cargo rpm
    - name: Upload .rpm Artifact
      uses: actions/upload-artifact@v3
      with:
        name: trueid-fedora-rpm
        path: crates/trueid-daemon/target/rpmbuild/RPMS/**/*.rpm

  deploy:
    needs: [build-ubuntu, build-fedora]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v3
      with:
        name: trueid-ubuntu-deb
    - uses: actions/download-artifact@v3
      with:
        name: trueid-fedora-rpm
    - name: Upload to Release
      run: |
        gh release upload "${GITHUB_REF#refs/tags/}" *.deb *.rpm
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}