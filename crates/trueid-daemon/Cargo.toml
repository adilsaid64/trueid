[package]
name = "trueid-daemon"
version = "0.1.0"
edition = "2024"

[dependencies]
image = { version = "0.25", default-features = false, features = ["jpeg", "png"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.149"
v4l = "0.14"
trueid-core = { path = "../trueid-core" }
trueid-ipc = { path = "../trueid-ipc" }
nalgebra = { version = "0.33", default-features = false, features = ["std"] }
tract-onnx = "0.21.5"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[package.metadata.deb]
maintainer = "Adil Said <adilsaid64@gmail.com>"
copyright = "2026, Adil Said"
license-file = ["LICENSE"]
depends = "$auto"
section = "utils"
priority = "optional"
assets = [
    ["../../target/release/trueid-ctl", "usr/bin/", "755"],
    ["../../target/release/trueid-daemon", "usr/bin/", "755"],
    ["../docs/README.md", "usr/share/doc/trueid/", "644"],
    ["../docs/models.md", "usr/share/doc/trueid/", "644"],
    ["../../scripts/postinst.sh", "var/lib/dpkg/info/trueid-daemon.postinst", "755"],
]

[package.metadata.rpm]
package = "trueid"
summary = "Biometric authentication for Linux"
license = "MIT"
assets = [
    ["../../target/release/trueid-ctl", "usr/bin/", "755"],
    ["../../target/release/trueid-daemon", "usr/bin/", "755"],
    ["../docs/README.md", "usr/share/doc/trueid/", "644"],
    ["../docs/models.md", "usr/share/doc/trueid/", "644"],
]
