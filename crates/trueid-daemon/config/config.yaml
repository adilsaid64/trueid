# Install copy: /etc/trueid/config.yaml

logging:
  level: info

camera:
  rgb_index: 0
  enable_rgb: true
  ir_index: 2
  enable_ir: false
  width: 640
  height: 480
  mock: false
  v4l:
    rotate_180: false
    flip_vertical: false

models:
  face_embedding: /var/lib/trueid/models/face_embedding.onnx
  face_detector: /var/lib/trueid/models/face_detection_yunet_2023mar.onnx

paths:
  templates: /var/lib/trueid/templates
  # debug_aligned_faces: /tmp/trueid-aligned
  # Decoded V4L output (PNG per frame): rgb/ and ir/ subdirs, one folder per burst.
  # debug_v4l_frames: /tmp/trueid-v4l

verification:
  match_threshold: 0.70
  # Burst capture: discard N warmup frames, then keep M frames (enroll vs verify).
  capture:
    enroll:
      warmup_discard: 2
      frame_count: 5
    verify:
      warmup_discard: 2
      frame_count: 3

development:
  mock_embedder: false
  mock_detector: false
  passthrough_aligner: false
