[changelog]
header = "# Changelog\n\n"
trim = true
body = """
## {{ version }}{% if timestamp %} ({{ timestamp | date(format="%Y-%m-%d") }}){% endif %}

{% if commits | filter(attribute="breaking") | length > 0 %}
### ⚠️ Breaking Changes
{% for commit in commits | filter(attribute="breaking") %}
- {{ commit.scope | default(value="") }}{% if commit.scope %}: {% endif %}{{ commit.message }}
{% endfor %}
{% endif %}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.scope | default(value="") }}{% if commit.scope %}: {% endif %}{{ commit.message }} ({{ commit.id | truncate(length=7, end="") }})
{% endfor %}
{% endfor %}
"""